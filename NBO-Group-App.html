<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#072b0e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NBO Connect"/>
<meta name="description" content="NBO Group — Espace de travail collaboratif"/>
<title>NBO Connect</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#072b0e;color:#ffffff;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#051f0a}::-webkit-scrollbar-thumb{background:#2d6633;border-radius:4px}
input,select,button,textarea{font-family:inherit}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.6}
.inp{background:#0e3516;border:1px solid #2d6633;border-radius:8px;padding:9px 12px;color:#ffffff;font-size:13px;outline:none;width:100%}
.inp::placeholder{color:#5a8a60}
.inp:focus{border-color:#e2bc50;box-shadow:0 0 0 2px #e2bc5022}
.btn{background:linear-gradient(135deg,#b8962a,#e2bc50);border:none;border-radius:8px;padding:9px 18px;color:#1a1000;font-weight:800;font-size:13px;cursor:pointer;letter-spacing:.01em}
.btn:hover{background:linear-gradient(135deg,#d4a92a,#f0cc60);color:#0d0800}
.btn2{background:#0e3516;border:1px solid #2d6633;border-radius:8px;padding:9px 16px;color:#9abf9e;font-size:13px;cursor:pointer}
.btn2:hover{background:#153d1c}
.btnd{background:#4a1000;border:1px solid #7a2000;border-radius:6px;padding:4px 10px;color:#ffaa80;font-size:11px;font-weight:600;cursor:pointer}
.btnd:hover{background:#6a1800}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#0a2e10;border:1px solid #2d6633;border-radius:18px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.adm{background:#2a1e00;color:#e2bc50;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;border:1px solid #e2bc5066}
#app{display:flex;height:100vh}
#sidebar{width:220px;background:#051f0a;border-right:1px solid #2d6633;display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow:auto}
.navbtn{width:100%;display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;cursor:pointer;border:none;font-size:14px;margin-bottom:2px;text-align:left;border-left:3px solid transparent;background:transparent;color:#6aaa70;font-weight:500;transition:all .15s}
.navbtn:hover{background:#0e3516;color:#c8e8c0}
.navbtn.active{background:#0e3516;color:#ffffff;font-weight:700;border-left-color:#e2bc50;box-shadow:inset 0 0 0 1px #e2bc5022}
.statcard{background:#0a2e10;border:1px solid #1f4d25;border-radius:14px;padding:20px 18px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card{background:#0a2e10;border:1px solid #1f4d25;border-radius:14px;padding:20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
</style>
</head>
<body>
<!-- PWA INSTALL BANNER -->
<div id="install-banner" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a2e10;border:1px solid #e2bc5066;border-radius:14px;padding:12px 20px;z-index:9999;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:300px;max-width:90vw">
  <div style="font-size:24px">📲</div>
  <div style="flex:1">
    <div style="font-size:13px;font-weight:700;color:#ffffff">Installer NBO Connect</div>
    <div style="font-size:11px;color:#7abf82">Accès rapide depuis votre écran d'accueil</div>
  </div>
  <button onclick="installPWA()" style="background:linear-gradient(135deg,#b8962a,#e2bc50);border:none;border-radius:8px;padding:8px 16px;color:#1a1000;font-weight:800;font-size:12px;cursor:pointer">Installer</button>
  <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#4a6a4e;font-size:18px;cursor:pointer;line-height:1">×</button>
</div>

      </div>

    </div>

    <button onclick="doLogin()" class="btn" style="width:100%;padding:13px;font-size:14px;margin-top:8px;border-radius:10px;letter-spacing:.02em">
      Se connecter →</button>

    <!-- Hint for demo -->
    <div style="margin-top:22px;padding-top:18px;border-top:1px solid #2d6633">
      <div style="font-size:11px;color:#274f2b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Comptes de démonstration</div>
      <div style="display:flex;flex-direction:column;gap:6px" id="demo-accounts"></div>

<div id="app">
  <div id="sidebar">

        <button class="btn" onclick="sendMsg()" style="padding:10px 20px">Envoyer</button>
      </div>

}

function setChatMode(mode){ chatMode=mode; renderMain(); }
function selectChat(id){ chatSelected=id; chatMode="direct"; renderMain(); }
function selectGroup(id){ chatGroupSelected=id; chatMode="group"; renderMain(); }

function sendMsg(){
  const inp=document.getElementById("chat-inp");
  if(!inp||!inp.value.trim()) return;
  const t=now();
  if(chatMode==="group"){
    if(!groupMessages[chatGroupSelected]) groupMessages[chatGroupSelected]=[];
    groupMessages[chatGroupSelected].push({id:Date.now(),from:"me",text:inp.value.trim(),time:t});
  } else {
    if(!messages[chatSelected]) messages[chatSelected]=[];
    messages[chatSelected].push({id:Date.now(),from:"me",text:inp.value.trim(),time:t});
  }
  inp.value="";
  scheduleSave();
  renderMain();
}

const GROUP_EMOJIS = ["💬","💻","🏢","📊","🎯","🚀","📋","🔧","💡","🌐","📣","🤝","🔒","📱","🎨"];

            <div style="display:flex;align-items:center;gap:10px;flex:1">
              ${avatarHTML(e,30)}
              <div><div style="font-size:13px;color:#f0ead8;font-weight:500">${e.name}</div><div style="font-size:11px;color:#7abf82">${e.role}</div></div>
            </div>
            <div style="width:18px;height:18px;border-radius:5px;border:2px solid ${checked?"#e2bc50":"#6a8a58"};background:${checked?"#e2bc50":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff">${checked?"✓":""}</div>
          </label>`;
        }).join("")}
      </div>
    </div>
    ${gfId&&isAdmin()?`<button onclick="deleteGroup('${gfId}')" style="width:100%;margin-bottom:12px;background:#1f1500;border:1px solid #e2bc5066;border-radius:8px;padding:9px;color:#fde047;font-size:13px;cursor:pointer">🗑 Supprimer ce groupe</button>`:""}

      <button class="btn2" onclick="closeGroupForm()">Annuler</button>

function pickEmoji(e){
  gfEmoji=e;
  document.getElementById("emoji-picker").style.display="none";
  renderGroupForm();
  // re-set name value after re-render
  const ni=document.getElementById("gf-name");
  if(ni) ni.value=gfName;
}

function toggleMember(id){
  if(gfMembers.includes(id)) gfMembers=gfMembers.filter(x=>x!==id);
  else gfMembers.push(id);
  renderGroupForm();
  const ni=document.getElementById("gf-name");
  if(ni) ni.value=gfName;
}

function closeGroupForm(){ document.getElementById("modal-emp").style.display="none"; }

function saveGroupForm(){
  const name=document.getElementById("gf-name")?.value.trim();
  if(!name) return alert("Donnez un nom au groupe.");
  if(gfMembers.length<2) return alert("Sélectionnez au moins 2 membres.");
  if(gfId){
    groups=groups.map(g=>g.id===gfId?{...g,name,emoji:gfEmoji,memberIds:gfMembers}:g);
  } else {
    const newId="g"+Date.now();
    groups.push({id:newId,name,emoji:gfEmoji,memberIds:gfMembers,createdBy:me()?.id||1});
    groupMessages[newId]=[];
    chatGroupSelected=newId;
    chatMode="group";
  }
  closeGroupForm();
  scheduleSave();
  renderMain();
}

function deleteGroup(gid){
  if(!confirm("Supprimer ce groupe définitivement ?")) return;
  groups=groups.filter(g=>g.id!==gid);
  delete groupMessages[gid];
  if(groups.length>0) chatGroupSelected=groups[0].id;
  closeGroupForm();
  scheduleSave();
  renderMain();
}

function addTask(){
  const title=document.getElementById("nt-title");
  if(!title||!title.value.trim()) return;
  newTask.title=title.value.trim();
  newTask.project=document.getElementById("nt-proj")?.value||"";
  newTask.due=document.getElementById("nt-due")?.value||"";
  newTask.assignee=document.getElementById("nt-ass")?.value||employees[0]?.name||"";
  newTask.priority=document.getElementById("nt-pri")?.value||"medium";
  tasks.push({...newTask,id:Date.now(),status:"todo"});
  newTask={title:"",project:"",assignee:employees[0]?.name||"",priority:"medium",due:""};
  taskFormVisible=false;
  scheduleSave();
  renderMain();
}
function cycleTask(id){
  const next={todo:"in-progress","in-progress":"done",done:"todo"};
  tasks=tasks.map(t=>t.id===id?{...t,status:next[t.status]}:t);
  scheduleSave();
  renderMain();
}

function setEmpColor(c){

function updateInitPreview(){
  if(empFormPhoto) return;
  const name=document.getElementById("ef-name")?.value||"NB";

  if(prev){
    const existing=prev.querySelector("div[style*='background:"+empFormColor+"']")||prev.querySelector("div[style*='background: "+empFormColor+"']");

function handlePhotoUpload(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    empFormPhoto=ev.target.result;
    const prev=document.getElementById("photo-prev");
    const img=prev.querySelector("img");
    const bg=prev.querySelector("div[style*='font-weight:700']");
    if(bg) bg.style.display="none";
    if(img){ img.src=empFormPhoto; }
    else {
      const ni=document.createElement("img");
      ni.src=empFormPhoto;
      ni.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover";
      prev.appendChild(ni);
    }
  };
  r.readAsDataURL(f);
}

function saveEmpForm(){
  const name=document.getElementById("ef-name")?.value.trim();
  const role=document.getElementById("ef-role")?.value.trim();
  const passInput=document.getElementById("ef-pass")?.value||"";
  if(!name||!role) return alert("Le nom et le poste sont obligatoires.");
  if(!empFormId && !passInput) return alert("Un mot de passe est obligatoire pour un nouvel employé.");
  const existing = empFormId ? employees.find(e=>e.id===empFormId) : null;
  const data = {
    name, role,
    dept: document.getElementById("ef-dept")?.value||DEPTS[0],
    email: document.getElementById("ef-email")?.value.trim()||"",
    phone: document.getElementById("ef-phone")?.value.trim()||"",
    online: document.getElementById("ef-online")?.checked||false,
    admin: document.getElementById("ef-admin")?.checked||false,
    photo: empFormPhoto,
    color: empFormColor,
    avatar: initials(name),
    password: passInput || (existing?.password||"nbo2026"),
  };
  if(empFormId){
    employees=employees.map(e=>e.id===empFormId?{...e,...data}:e);
    // update session if editing self
    if(sessionUser?.id===empFormId) sessionUser={...sessionUser,...data};
  } else {
    employees.push({...data,id:Date.now()});
  }
  closeEmpForm();
  scheduleSave();
  renderNav();
  renderMain();
}

function fileIcon(type){
  const icons = {pdf:"📄",docx:"📝",xlsx:"📊",pptx:"📋",img:"🖼️",zip:"🗜️",txt:"📃"};
  if(["jpg","jpeg","png","gif","webp"].includes(type)) return icons.img;
  return icons[type] || "📎";
}

function formatSize(bytes){
  if(!bytes) return "";
  if(bytes < 1024) return bytes+"o";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(0)+" Ko";
  return (bytes/(1024*1024)).toFixed(1)+" Mo";
}

    const ext = uploadDocFile.name.split(".").pop().toLowerCase();
    documents.push({
      id: "d"+Date.now(),
      name: uploadDocFile.name,
      size: formatSize(uploadDocFile.size),
      type: ext,
      category: document.getElementById("doc-cat")?.value||"Autre",
      uploadedBy: sessionUser.id,
      uploadedAt: today,
      targetId: document.getElementById("doc-target")?.value||"all",
      status: document.getElementById("doc-status")?.value||"en revue",

      comment: document.getElementById("doc-comment")?.value.trim()||"",
    });

// ── GITHUB SYNC ENGINE ────────────────────────────────────────────────────────
const GH_REPO_DATA = "nbo-data";
const GH_OWNER     = "NBO-GROUP";
const GH_BRANCH    = "main";
const GH_FILE      = "nbo-app-data.json";
const GH_API       = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO_DATA}/contents/${GH_FILE}`;

let ghToken   = localStorage.getItem("nbo_gh_token") || "";
let ghFileSha = localStorage.getItem("nbo_gh_sha")   || "";
let syncPending = false;
let syncTimeout = null;

// ── Read data from GitHub ─────────────────────────────────────────────────────
async function ghLoad(){
  if(!ghToken) return false;
  try {
    const r = await fetch(GH_API + "?ref=" + GH_BRANCH, {
      headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json" }
    });
    if(r.status === 404){
      // file doesn't exist yet — will be created on first save
      return true;
    }
    if(!r.ok) return false;
    const json = await r.json();
    ghFileSha = json.sha;
    localStorage.setItem("nbo_gh_sha", ghFileSha);
    const data = JSON.parse(atob(json.content.replace(/\n/g,"")));
    // restore state
    if(data.employees)  employees  = data.employees;
    if(data.tasks)      tasks      = data.tasks;
    if(data.groups)     groups     = data.groups;
    if(data.messages)   messages   = data.messages;
    if(data.groupMessages) groupMessages = data.groupMessages;
    if(data.documents)  documents  = data.documents;
    return true;
  } catch(e){ console.error("ghLoad error:", e); return false; }
}

// ── Save data to GitHub ───────────────────────────────────────────────────────
async function ghSave(){
  if(!ghToken) return;
  syncPending = false;
  showSyncStatus("saving");
  const payload = { employees, tasks, groups, messages, groupMessages, documents };
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const body = {
    message: `NBO Connect — sauvegarde automatique ${new Date().toLocaleString("fr-FR")}`,
    content,
    branch: GH_BRANCH,
  };
  if(ghFileSha) body.sha = ghFileSha;
  try {
    const r = await fetch(GH_API, {
      method: "PUT",
      headers: { Authorization: "token " + ghToken, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if(!r.ok){ const e=await r.json(); throw new Error(e.message); }
    const json = await r.json();
    ghFileSha = json.content.sha;
    localStorage.setItem("nbo_gh_sha", ghFileSha);
    showSyncStatus("saved");
  } catch(e){ console.error("ghSave error:", e); showSyncStatus("error"); }
}

// Debounced save — waits 1.5s after last action before saving
function scheduleSave(){
  clearTimeout(syncTimeout);
  showSyncStatus("pending");
  syncTimeout = setTimeout(ghSave, 1500);
}

// ── Sync status indicator ─────────────────────────────────────────────────────
function showSyncStatus(state){
  const el = document.getElementById("sync-status");
  if(!el) return;
  const states = {
    pending: { icon:"⏳", text:"En attente…",  color:"#e2bc50" },
    saving:  { icon:"☁",  text:"Sauvegarde…", color:"#7abf82" },
    saved:   { icon:"✓",  text:"Synchronisé", color:"#6dda50" },
    error:   { icon:"✗",  text:"Erreur sync", color:"#ff8080" },
    offline: { icon:"○",  text:"Hors-ligne",  color:"#9a9070" },
  };
  const s = states[state] || states.offline;
  el.innerHTML = `<span style="color:${s.color};font-size:11px;display:flex;align-items:center;gap:4px">${s.icon} ${s.text}</span>`;
}

async function saveGhConfig(){
  const token = document.getElementById("cfg-token")?.value.trim();
  const errEl = document.getElementById("cfg-err");
  const okEl  = document.getElementById("cfg-ok");
  const btn   = document.getElementById("cfg-btn");
  errEl.style.display = "none";
  okEl.style.display  = "none";
  if(!token){ errEl.textContent="Veuillez saisir votre token GitHub."; errEl.style.display="block"; return; }
  btn.textContent = "Vérification…"; btn.disabled = true;
  // Test token by checking repo access
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO_DATA}`, {
      headers: { Authorization: "token " + token }
    });
    if(r.status===401){ throw new Error("Token invalide ou expiré."); }
    if(r.status===404){ throw new Error(`Repo "${GH_REPO_DATA}" introuvable. Vérifiez qu'il existe et que le token a accès.`); }
    if(!r.ok){ throw new Error("Erreur GitHub : " + r.status); }
    // Token OK — save and load data
    ghToken = token;
    localStorage.setItem("nbo_gh_token", token);
    okEl.textContent = "✓ Connexion réussie ! Chargement des données…";
    okEl.style.display = "block";
    const loaded = await ghLoad();
    setTimeout(()=>{
      document.getElementById("config-screen").style.display = "none";
      document.getElementById("login-screen").style.display  = "flex";
      renderLoginDemoAccounts();
    }, 1200);
  } catch(e){
    errEl.textContent = "✗ " + e.message;
    errEl.style.display = "block";
    btn.textContent = "Connecter & Synchroniser →";
    btn.disabled = false;
  }
}

function skipConfig(){
  localStorage.removeItem("nbo_gh_token");
  ghToken = "";
  document.getElementById("config-screen").style.display = "none";
  document.getElementById("login-screen").style.display  = "flex";
}

function resetGhConfig(){
  localStorage.removeItem("nbo_gh_token");
  localStorage.removeItem("nbo_gh_sha");
  ghToken = ""; ghFileSha = "";
  showConfigScreen();
  renderConfigScreen();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function showScreen(id){
  ['config-screen','login-screen','app'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.style.display = s===id ? (s==='app'?'flex':'flex') : 'none';
  });
}

function renderLoginDemoAccounts(){
  const cont=document.getElementById("demo-accounts");
  if(!cont) return;
  cont.innerHTML=employees.slice(0,3).map(e=>{
    const av=e.photo
      ? `<img src="${e.photo}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div style="width:32px;height:32px;border-radius:50%;background:${e.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${e.avatar}</div>`;
    return `<div onclick="fillLogin('${e.email}','${e.password}')"
      style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0a2e10;border:1px solid #1f4d25;border-radius:8px;cursor:pointer;margin-bottom:6px"
      onmouseover="this.style.borderColor='#e2bc50'" onmouseout="this.style.borderColor='#1f4d25'">
      ${av}
      <div style="flex:1">
        <div style="font-size:12px;color:#f0ead8;font-weight:600">${e.name} ${e.admin?'<span class="adm">Admin</span>':''}</div>
        <div style="font-size:11px;color:#7abf82">${e.email}</div>
      </div>
      <div style="font-size:10px;color:#4a6a4e;font-family:monospace">${e.password}</div>
    </div>`;
  }).join("");
}

// Hide everything first
['config-screen','login-screen','app'].forEach(s=>{
  const el=document.getElementById(s);
  if(el) el.style.display='none';
});

renderNav();
renderMain();

// Startup: show config if no token, else show login
(async function init(){
  try {
    if(ghToken){
      showScreen('login-screen');
      renderLoginDemoAccounts();
      await ghLoad();
      renderLoginDemoAccounts();
      showSyncStatus("saved");
    } else {
      renderConfigScreen();
      showScreen('config-screen');
    }
  } catch(err){
    console.error('Init error:', err);
    // Fallback: always show login screen
    showScreen('login-screen');
    renderLoginDemoAccounts();
  }
})();

}); // end DOMContentLoaded
</script>
</body>
</html>
